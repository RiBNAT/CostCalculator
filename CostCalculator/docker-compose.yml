services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      # Healthy only once the replica set is initiated and a primary is elected.
      test: ["CMD", "mongosh", "--quiet", "--eval", "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: ./backend
    environment:
      MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      MONGO_DB: ribnat  # legacy database name kept after the Cost Calculator rename
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}  # set to enable Sign in with Google
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"

  # Next.js frontend (App Router). The browser talks same-origin and Next proxies /api/* to the api service.
  # The legacy Angular app remains at ./frontend for reference until cutover is signed off.
  web:
    build: ./web
    environment:
      API_TARGET: ${API_TARGET:-http://api:8080}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  mongo-data:
