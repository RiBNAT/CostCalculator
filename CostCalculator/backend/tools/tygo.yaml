packages:
  - path: "costcalculator/backend/internal/domain"
    output_path: "../web/lib/types.gen.ts"
    type_mappings:
      time.Time: "string"
      int64: "number"
    frontmatter: |
      // Code generated by tygo from internal/domain. DO NOT EDIT.
      // Regenerate with: backend/tools/gen-types.sh
      // Service response aggregates (PeriodSummary, PeriodTrends, ...) are
      // hand-maintained in types.ts because they reference these entities
      // across packages, which tygo cannot resolve into a single file.
